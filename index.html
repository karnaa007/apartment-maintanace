<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Maintenance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-800">Apartment Maintenance Dashboard</h1>
            <div class="space-x-2">
                <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700">Export CSV</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm uppercase">Total Collections</p>
                <p id="totalCollected" class="text-2xl font-bold text-gray-800">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                <p class="text-gray-500 text-sm uppercase">Total Penalties</p>
                <p id="totalPenalty" class="text-2xl font-bold text-gray-800">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cyan-500">
                <p class="text-gray-500 text-sm uppercase">Water Charges</p>
                <p id="totalWater" class="text-2xl font-bold text-gray-800">₹0</p>
            </div>
             <div class="bg-white p-6 rounded-lg shadow border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm uppercase">Parking Revenue</p>
                <p id="totalParking" class="text-2xl font-bold text-gray-800">₹0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Add New Entry</h2>
            <form id="maintenanceForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="flatNo" placeholder="Flat No (e.g. 101)" class="border p-2 rounded w-full" required>
                <select id="cycle" class="border p-2 rounded w-full" required>
                    <option value="Monthly">Monthly</option>
                    <option value="Quarterly">Quarterly</option>
                    <option value="Half-Yearly">Half-Yearly</option>
                    <option value="Yearly">Yearly</option>
                </select>
                <input type="number" id="maintFee" placeholder="Maint. Fee" class="border p-2 rounded w-full" required>
                <input type="number" id="parkingFee" placeholder="Car Parking Fee" class="border p-2 rounded w-full">
                <input type="number" id="waterFee" placeholder="Water Charges" class="border p-2 rounded w-full">
                <input type="number" id="penaltyFee" placeholder="Penalty Amount" class="border p-2 rounded w-full">
                <input type="date" id="date" class="border p-2 rounded w-full" required>
                <button type="submit" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">Add to Sheet</button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="p-4 border-b">
                <h2 class="text-xl font-semibold text-gray-700">Balance Sheet</h2>
            </div>
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
                    <tr>
                        <th class="p-4">Date</th>
                        <th class="p-4">Flat No</th>
                        <th class="p-4">Cycle</th>
                        <th class="p-4">Maint.</th>
                        <th class="p-4">Parking</th>
                        <th class="p-4">Water</th>
                        <th class="p-4">Penalty</th>
                        <th class="p-4 font-bold text-blue-800">Total Bill</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
    let entries = JSON.parse(localStorage.getItem('apt_maint_data')) || [];

    const form = document.getElementById('maintenanceForm');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const entry = {
            id: Date.now(),
            date: document.getElementById('date').value,
            flatNo: document.getElementById('flatNo').value,
            cycle: document.getElementById('cycle').value,
            maint: parseFloat(document.getElementById('maintFee').value || 0),
            parking: parseFloat(document.getElementById('parkingFee').value || 0),
            water: parseFloat(document.getElementById('waterFee').value || 0),
            penalty: parseFloat(document.getElementById('penaltyFee').value || 0),
        };

        const scriptURL = 'https://script.google.com/macros/s/AKfycbxSf3vRcEtBPvaeSw8wDoR21WM50A64JvgW44HDynxGu_90gz6KcfGiWS-vvadxpW_Muw/exec'; 

        try {
            // Attempt to send to Google Sheets
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });

            alert("Entry recorded successfully!");
            entries.push(entry);
            saveAndRender();
            form.reset();
        } catch (error) {
            console.error('Error!', error);
            alert("Local save successful, but failed to sync with Google Sheets.");
            // Still save locally even if fetch fails
            entries.push(entry);
            saveAndRender();
        }
    }); // This was likely the missing bracket!

    function deleteEntry(id) {
        entries = entries.filter(e => e.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('apt_maint_data', JSON.stringify(entries));
        renderTable();
        updateSummary();
    }

    function updateSummary() {
        let total = 0, penalty = 0, water = 0, parking = 0;
        entries.forEach(e => {
            total += (e.maint + e.penalty + e.water + e.parking);
            penalty += e.penalty;
            water += e.water;
            parking += e.parking;
        });
        document.getElementById('totalCollected').innerText = `₹${total.toLocaleString()}`;
        document.getElementById('totalPenalty').innerText = `₹${penalty.toLocaleString()}`;
        document.getElementById('totalWater').innerText = `₹${water.toLocaleString()}`;
        document.getElementById('totalParking').innerText = `₹${parking.toLocaleString()}`;
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        entries.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(e => {
            const rowTotal = e.maint + e.parking + e.water + e.penalty;
            const row = `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4">${e.date}</td>
                    <td class="p-4 font-medium">${e.flatNo}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs">${e.cycle}</span></td>
                    <td class="p-4">₹${e.maint}</td>
                    <td class="p-4">₹${e.parking}</td>
                    <td class="p-4">₹${e.water}</td>
                    <td class="p-4 text-red-600">₹${e.penalty}</td>
                    <td class="p-4 font-bold text-blue-800">₹${rowTotal}</td>
                    <td class="p-4"><button onclick="deleteEntry(${e.id})" class="text-red-500 hover:underline">Delete</button></td>
                </tr>`;
            tbody.innerHTML += row;
        });
    }

    function exportToCSV() {
        let csv = "Date,Flat No,Cycle,Maintenance,Parking,Water,Penalty,Total\n";
        entries.forEach(e => {
            csv += `${e.date},${e.flatNo},${e.cycle},${e.maint},${e.parking},${e.water},${e.penalty},${e.maint + e.parking + e.water + e.penalty}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'maintenance_report.csv';
        a.click();
    }

    // Load data on start
    saveAndRender();
</script>
</body>
</html>
