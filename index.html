<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Apartment Manager v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-gradient { background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%); }
        .defaulter-row { background-color: #fee2e2 !important; border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <div class="max-w-7xl mx-auto p-4">
        <header class="header-gradient text-white p-6 rounded-xl shadow-lg mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Apartment Maintenance Portal</h1>
                <p class="opacity-80">Senior Admin Dashboard</p>
            </div>
        </header>

        <div class="bg-indigo-900 text-white rounded-xl shadow-lg p-6 mb-8">
            <div class="flex justify-between items-center mb-4 border-b border-indigo-700 pb-2">
                <h2 class="text-lg font-bold">1. Set Monthly Rates (Applies to all)</h2>
                <button id="editConfigBtn" onclick="toggleConfig()" class="bg-indigo-500 px-4 py-1 rounded text-sm hover:bg-indigo-400">Edit Rates</button>
            </div>
            <div id="configGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs opacity-70 uppercase">Maint. Fee</label>
                    <input type="number" id="cfgMaint" value="2000" class="bg-indigo-800 border-none rounded p-2 w-full" readonly>
                </div>
                <div>
                    <label class="block text-xs opacity-70 uppercase">Parking</label>
                    <input type="number" id="cfgParking" value="500" class="bg-indigo-800 border-none rounded p-2 w-full" readonly>
                </div>
                <div>
                    <label class="block text-xs opacity-70 uppercase">Water</label>
                    <input type="number" id="cfgWater" value="300" class="bg-indigo-800 border-none rounded p-2 w-full" readonly>
                </div>
                <div>
                    <label class="block text-xs opacity-70 uppercase">Other</label>
                    <input type="number" id="cfgOther" value="0" class="bg-indigo-800 border-none rounded p-2 w-full" readonly>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
            <h2 class="text-lg font-bold mb-4 border-b pb-2 text-blue-800">2. Record Flat Payment</h2>
            <form id="maintenanceForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="block" class="border p-2 rounded" onchange="updateFlatNumbers()" required>
                    <option value="">Select Block</option><option value="A">Block A</option><option value="B">Block B</option>
                </select>
                <select id="flatNo" class="border p-2 rounded" required><option value="">Select Flat</option></select>
                <input type="text" id="ownerName" placeholder="Owner Name" class="border p-2 rounded" required>
                <select id="month" class="border p-2 rounded" required>
                    <option value="">Billing Month</option><option>January</option><option>February</option><option>March</option>
                    <option>April</option><option>May</option><option>June</option><option>July</option>
                </select>

                <div class="md:col-span-4 grid grid-cols-2 md:grid-cols-6 gap-4 bg-slate-50 p-4 rounded-lg border border-dashed">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Maint.</label>
                        <input type="number" id="maintFee" class="w-full border-none bg-transparent font-bold" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Parking</label>
                        <input type="number" id="parkingFee" class="w-full border-none bg-transparent font-bold" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Water</label>
                        <input type="number" id="waterFee" class="w-full border-none bg-transparent font-bold" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Penalty (Auto)</label>
                        <input type="number" id="penaltyFee" class="w-full border-none text-red-600 font-bold" value="0" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Paid Amount</label>
                        <input type="number" id="paidAmount" placeholder="0" class="w-full border-b-2 border-blue-600 focus:outline-none" required>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500">Entry Date</label>
                        <input type="date" id="date" class="w-full border-none bg-transparent" onchange="calculatePenalty()" required>
                    </div>
                </div>

                <button type="submit" class="md:col-span-4 bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition">Save Payment Record</button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-x-auto">
            <table class="w-full text-left" id="maintTable">
                <thead>
                    <tr class="bg-slate-800 text-white text-xs">
                        <th class="p-4">Flat</th>
                        <th class="p-4">Month</th>
                        <th class="p-4">Total Due</th>
                        <th class="p-4">Penalty</th>
                        <th class="p-4">Paid</th>
                        <th class="p-4">Pending</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm divide-y"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';
        let entries = JSON.parse(localStorage.getItem('apt_v3_data')) || [];

        // 1. ADMIN CONFIG TOGGLE
        function toggleConfig() {
            const inputs = document.querySelectorAll('#configGrid input');
            const btn = document.getElementById('editConfigBtn');
            const isEditing = btn.innerText === "Save Rates";

            inputs.forEach(input => {
                input.readOnly = isEditing;
                input.classList.toggle('bg-white', !isEditing);
                input.classList.toggle('text-black', !isEditing);
            });

            if (isEditing) {
                btn.innerText = "Edit Rates";
                btn.className = "bg-indigo-500 px-4 py-1 rounded text-sm hover:bg-indigo-400";
                syncConfigToForm();
            } else {
                btn.innerText = "Save Rates";
                btn.className = "bg-green-500 px-4 py-1 rounded text-sm hover:bg-green-400";
            }
        }

        // 2. AUTO-SYNC ADMIN RATES TO ENTRY FORM
        function syncConfigToForm() {
            document.getElementById('maintFee').value = document.getElementById('cfgMaint').value;
            document.getElementById('parkingFee').value = document.getElementById('cfgParking').value;
            document.getElementById('waterFee').value = document.getElementById('cfgWater').value;
        }

        // 3. PENALTY LOGIC (If day > 15)
        function calculatePenalty() {
            const dateVal = document.getElementById('date').value;
            if (!dateVal) return;
            const day = new Date(dateVal).getDate();
            document.getElementById('penaltyFee').value = (day > 15) ? 500 : 0;
        }

        // 4. DUPLICATE CHECK & SAVE
        document.getElementById('maintenanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const flatNo = document.getElementById('flatNo').value;
            const month = document.getElementById('month').value;

            if (entries.some(ent => ent.flatNo === flatNo && ent.month === month)) {
                alert("Duplicate record detected for this flat and month!");
                return;
            }

            const maint = parseFloat(document.getElementById('maintFee').value);
            const park = parseFloat(document.getElementById('parkingFee').value);
            const water = parseFloat(document.getElementById('waterFee').value);
            const penalty = parseFloat(document.getElementById('penaltyFee').value);
            const paid = parseFloat(document.getElementById('paidAmount').value);
            
            const totalDue = maint + park + water + penalty;
            const pending = totalDue - paid;

            const entry = {
                id: Date.now(),
                flatNo, month, 
                owner: document.getElementById('ownerName').value,
                totalDue, penalty, paid, pending,
                date: document.getElementById('date').value
            };

            entries.push(entry);
            localStorage.setItem('apt_v3_data', JSON.stringify(entries));
            renderTable();
            e.target.reset();
            syncConfigToForm();
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            entries.forEach(e => {
                const isDefaulter = e.pending > 0 || e.penalty > 0;
                const row = `<tr class="${isDefaulter ? 'defaulter-row' : ''}">
                    <td class="p-4 font-bold">${e.flatNo}</td>
                    <td class="p-4">${e.month}</td>
                    <td class="p-4">₹${e.totalDue}</td>
                    <td class="p-4 text-red-600 font-bold">₹${e.penalty}</td>
                    <td class="p-4 text-green-700">₹${e.paid}</td>
                    <td class="p-4 font-black ${e.pending > 0 ? 'text-red-600' : 'text-slate-400'}">₹${e.pending}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[10px] ${e.pending <= 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${e.pending <= 0 ? 'CLEAR' : 'DUE'}
                        </span>
                    </td>
                    <td class="p-4"><button onclick="deleteEntry(${e.id})" class="text-xs text-red-400">Delete</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // Helper for flat numbers (same as existing)
        function updateFlatNumbers() {
            const block = document.getElementById('block').value;
            const select = document.getElementById('flatNo');
            select.innerHTML = '<option value="">Select Flat</option>';
            if (!block) return;
            for(let i=101; i<=104; i++) {
                let opt = document.createElement('option');
                opt.value = `${block}-${i}`; opt.innerHTML = `${block}-${i}`;
                select.appendChild(opt);
            }
        }

        // Initial setup
        syncConfigToForm();
        renderTable();
    </script>
</body>
</html>
